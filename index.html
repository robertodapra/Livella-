<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LIVELLA GRAVITÀ ZERO</title>
    <style>
        :root { --orange: #ff6600; --black: #1a1a1a; --neon: #adff2f; --alert: #ff3300; }
        body { font-family: 'Segoe UI', sans-serif; background: #222; color: white; margin: 0; padding: 15px; display: flex; flex-direction: column; align-items: center; }
        
        .tool-body { background: var(--orange); padding: 25px; border-radius: 20px; width: 100%; max-width: 400px; box-shadow: 0 15px 40px rgba(0,0,0,0.6); text-align: center; }
        
        /* Display Digitale Precisione */
        .lcd { background: #000; padding: 20px; border-radius: 10px; margin-bottom: 20px; border: 3px solid #444; }
        .lcd-val { font-size: 3.5rem; font-weight: bold; font-family: monospace; color: var(--neon); }
        .lcd-label { font-size: 0.8rem; color: #888; text-transform: uppercase; }

        /* Viale Bolla */
        .vial { background: #000; height: 70px; border-radius: 35px; position: relative; overflow: hidden; border: 3px solid #333; margin: 20px 0; }
        .bubble { 
            background: var(--neon); width: 80px; height: 50px; border-radius: 25px; 
            position: absolute; top: 10px; left: 50%; transform: translateX(-50%); 
            transition: transform 0.05s linear, background 0.3s;
            box-shadow: 0 0 20px var(--neon); 
        }
        
        /* Segni di precisione */
        .center-marks {
            position: absolute; width: 84px; height: 100%; left: 50%; transform: translateX(-50%);
            border-left: 3px solid rgba(255,255,255,0.5); border-right: 3px solid rgba(255,255,255,0.5); z-index: 5;
        }

        .btn-connect { width: 100%; padding: 20px; background: var(--black); color: white; border: none; border-radius: 15px; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        
        /* Stato "In Bolla" */
        .perfect { background: #fff !important; box-shadow: 0 0 30px #fff !important; }
    </style>
</head>
<body>

    <div class="tool-body">
        <div class="lcd">
            <span class="lcd-label">Inclinazione Reale</span>
            <div class="lcd-val"><span id="deg">0.0</span>°</div>
        </div>

        <div class="vial">
            <div class="center-marks"></div>
            <div id="bubble" class="bubble"></div>
        </div>

        <button id="btn" class="btn-connect" onclick="connectBT()">🔍 Collega Sensore Gravità</button>
        <p id="status" style="color:var(--black); font-weight:bold; margin-top:15px; font-size:0.9rem;">SISTEMA PRONTO</p>
    </div>

    <script>
        let char;

        async function connectBT() {
            try {
                const device = await navigator.bluetooth.requestDevice({
                    acceptAllDevices: true,
                    optionalServices: ['4fafc201-1fb5-459e-8fcc-c5c9c331914b']
                });
                const server = await device.gatt.connect();
                const service = await server.getPrimaryService('4fafc201-1fb5-459e-8fcc-c5c9c331914b');
                char = await service.getCharacteristic('beb5483e-36e1-4688-b7f5-ea07361b26a8');

                await char.startNotifications();
                char.addEventListener('characteristicvaluechanged', handleData);
                
                document.getElementById('status').innerText = "LIVELLA ATTIVA";
                document.getElementById('btn').style.display = "none";
            } catch (e) { alert("Attiva il Bluetooth e usa Chrome."); }
        }

        function handleData(event) {
            let decoder = new TextDecoder('utf-8');
            let raw = decoder.decode(event.target.value).split(',');
            let angle = parseFloat(raw[0]) || 0; // Usiamo il valore puro che arriva dal sensore

            document.getElementById('deg').innerText = Math.abs(angle).toFixed(1);

            // Calcolo posizione bolla
            let move = Math.max(-140, Math.min(140, angle * 18));
            const b = document.getElementById('bubble');
            b.style.transform = `translateX(calc(-50% + ${move}px))`;

            // Se l'angolo è quasi zero (meno di 0.2 gradi), è "In Bolla" perfetta
            if (Math.abs(angle) < 0.2) {
                b.classList.add('perfect');
                document.getElementById('status').innerText = "PERFETTO (0°)";
            } else {
                b.classList.remove('perfect');
                document.getElementById('status').innerText = "RILEVAMENTO GRAVITÀ...";
            }
        }
    </script>
</body>
</html>
