<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LIVELLA PROFESSIONALE PRO</title>
    <style>
        :root {
            --orange: #ff6600;
            --dark-grey: #1a1a1a;
            --vial-bg: #0a0a0a;
            --neon-bubble: #adff2f;
        }

        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background-color: #333;
            color: white;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        /* Scocca dell'attrezzo */
        .spirit-level-body {
            background-color: var(--orange);
            width: 90%;
            max-width: 400px;
            padding: 30px 20px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5), inset 0 -5px 10px rgba(0,0,0,0.2);
            border-bottom: 6px solid #b34700;
            text-align: center;
        }

        h1 { color: var(--dark-grey); margin-bottom: 20px; font-size: 1.2rem; text-transform: uppercase; letter-spacing: 2px; }

        /* Contenitori delle bolle (Vials) */
        .vial {
            background: var(--vial-bg);
            border: 4px solid #444;
            position: relative;
            box-shadow: inset 0 0 15px #000;
            margin: 15px auto;
        }

        .horizontal { height: 60px; width: 100%; border-radius: 30px; }
        .vertical { height: 180px; width: 60px; border-radius: 30px; }
        .bullseye { height: 160px; width: 160px; border-radius: 50%; }

        /* La Bolla */
        .bubble {
            background: var(--neon-bubble);
            border-radius: 50%;
            position: absolute;
            box-shadow: 0 0 20px var(--neon-bubble), inset -5px -5px 10px rgba(0,0,0,0.3), inset 5px 5px 10px rgba(255,255,255,0.8);
            transition: transform 0.08s ease-out;
        }

        .h-bubble { width: 70px; height: 40px; top: 10px; left: 50%; transform: translateX(-50%); }
        .v-bubble { width: 40px; height: 70px; left: 10px; top: 50%; transform: translateY(-50%); }
        .b-bubble { width: 45px; height: 45px; top: 50%; left: 50%; transform: translate(-50%, -50%); }

        /* Segni di riferimento (Linee nere sulla livella) */
        .marks {
            position: absolute;
            border: 2px solid rgba(255,255,255,0.4);
            z-index: 5;
            pointer-events: none;
        }
        .h-marks { height: 100%; width: 74px; left: 50%; transform: translateX(-50%); border-top: 0; border-bottom: 0; }
        .v-marks { width: 100%; height: 74px; top: 50%; transform: translateY(-50%); border-left: 0; border-right: 0; }

        /* Visualizzazione Gradi */
        .display {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
        }

        .value-card {
            background: rgba(0,0,0,0.7);
            padding: 10px;
            border-radius: 10px;
            width: 45%;
        }

        .value-card span { font-size: 1.8rem; font-weight: bold; display: block; color: var(--neon-bubble); }
        .value-card label { font-size: 0.7rem; text-transform: uppercase; color: #aaa; }

        /* Pulsanti */
        button {
            width: 100%;
            padding: 15px;
            background: var(--dark-grey);
            color: white;
            border: none;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            box-shadow: 0 4px #000;
        }

        button:active { transform: translateY(2px); box-shadow: 0 2px #000; }
    </style>
</head>
<body>

    <div class="spirit-level-body">
        <h1>Work Master Pro</h1>

        <div class="display">
            <div class="value-card">
                <label>Roll (Orizz)</label>
                <span id="txt-h">0.0°</span>
            </div>
            <div class="value-card">
                <label>Pitch (Vert)</label>
                <span id="txt-v">0.0°</span>
            </div>
        </div>

        <div class="vial horizontal">
            <div class="marks h-marks"></div>
            <div id="bubble-h" class="bubble h-bubble"></div>
        </div>

        <div style="display: flex; justify-content: space-around; align-items: center; margin-top: 20px;">
            <div class="vial vertical">
                <div class="marks v-marks"></div>
                <div id="bubble-v" class="bubble v-bubble"></div>
            </div>

            <div class="vial bullseye">
                <div style="position:absolute; top:50%; left:50%; width:55px; height:55px; border:2px solid white; border-radius:50%; transform:translate(-50%,-50%); opacity:0.2;"></div>
                <div id="bubble-b" class="bubble b-bubble"></div>
            </div>
        </div>

        <button onclick="resetZero()">Azzera Taratura</button>
    </div>

    <script>
        let offsetH = 0;
        let offsetV = 0;

        function resetZero() {
            // Qui implementeresti la logica per salvare l'offset attuale
            alert("Strumento calibrato sullo zero!");
        }

        // Funzione per simulare o ricevere dati (se collegato ad Arduino)
        function updateLevel(roll, pitch) {
            const h = roll - offsetH;
            const v = pitch - offsetV;

            // Aggiorna Testo
            document.getElementById('txt-h').innerText = h.toFixed(1) + "°";
            document.getElementById('txt-v').innerText = v.toFixed(1) + "°";

            // Muovi Bolla Orizzontale (max +/- 140px)
            let moveH = Math.max(-140, Math.min(140, h * 15));
            document.getElementById('bubble-h').style.transform = `translateX(calc(-50% + ${moveH}px))`;

            // Muovi Bolla Verticale (max +/- 80px)
            let moveV = Math.max(-80, Math.min(80, v * 15));
            document.getElementById('bubble-v').style.transform = `translateY(calc(-50% + ${moveV}px))`;

            // Muovi Bolla Oculare (combinata)
            document.getElementById('bubble-b').style.transform = `translate(calc(-50% + ${moveH/3}px), calc(-50% + ${moveV/3}px))`;
            
            // Cambio colore se in bolla perfetta
            const isLevel = Math.abs(h) < 0.3 && Math.abs(v) < 0.3;
            const color = isLevel ? "#00ff00" : "#adff2f";
            document.querySelectorAll('.bubble').forEach(b => b.style.backgroundColor = color);
            document.querySelectorAll('.bubble').forEach(b => b.style.boxShadow = `0 0 20px ${color}`);
        }

        // FETCH DATI DA ARDUINO
        setInterval(() => {
            fetch('/data')
                .then(response => response.json())
                .then(data => {
                    updateLevel(data.roll, data.pitch);
                })
                .catch(err => console.log("In attesa di dati dall'attrezzo..."));
        }, 80);
    </script>
</body>
</html>
