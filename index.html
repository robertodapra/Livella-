<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Livella Pro</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Share+Tech+Mono&display=swap');

:root {
  --bg:     #0d0f0e;
  --bg2:    #131815;
  --panel:  #181e1a;
  --border: #2a3830;
  --green:  #00e87a;
  --gdim:   #00a050;
  --amber:  #ffb700;
  --red:    #ff3d3d;
  --text:   #c8d8cc;
  --muted:  #4a6050;
  --hud:    'Share Tech Mono', monospace;
  --ui:     'Rajdhani', sans-serif;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--ui);
  min-height: 100svh;
  display: flex;
  flex-direction: column;
  overflow-x: hidden;
  -webkit-tap-highlight-color: transparent;
}

body::before {
  content: '';
  position: fixed; inset: 0;
  background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,.07) 2px, rgba(0,0,0,.07) 4px);
  pointer-events: none;
  z-index: 100;
}

header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 18px;
  border-bottom: 1px solid var(--border);
  background: var(--bg2);
}

.logo {
  font-weight: 700;
  font-size: 1.25rem;
  letter-spacing: .12em;
  text-transform: uppercase;
  color: var(--green);
  display: flex;
  align-items: center;
  gap: 8px;
}
.logo svg { width: 22px; height: 22px; }
.logo .sub { color: var(--muted); font-weight: 400; font-size: .8rem; }

.status-row { display: flex; align-items: center; gap: 8px; font-family: var(--hud); font-size: .75rem; color: var(--muted); }

#dot {
  width: 10px; height: 10px; border-radius: 50%;
  background: var(--muted); box-shadow: 0 0 6px var(--muted);
  transition: background .3s, box-shadow .3s;
}
#dot.on  { background: var(--green); box-shadow: 0 0 10px var(--green); }
#dot.blink { background: var(--amber); box-shadow: 0 0 10px var(--amber); animation: blink 1s infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }

/* ── BANNER ── */
#banner {
  margin: 14px 16px 0;
  padding: 10px 16px;
  border-radius: 4px;
  border: 1px solid var(--muted);
  font-family: var(--hud);
  font-size: .8rem;
  letter-spacing: .15em;
  text-align: center;
  color: var(--muted);
  text-transform: uppercase;
  transition: all .3s;
}
#banner.ok {
  border-color: var(--green);
  background: rgba(0,232,122,.08);
  color: var(--green);
  box-shadow: 0 0 20px rgba(0,232,122,.15);
}

/* ── CARDS ── */
.levels { padding: 14px 16px 8px; display: flex; flex-direction: column; gap: 14px; }

.card {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 12px 14px;
}
.card-label {
  font-size: .68rem; letter-spacing: .15em; text-transform: uppercase;
  color: var(--muted); margin-bottom: 10px;
  display: flex; justify-content: space-between;
}
.card-label .ax { color: var(--gdim); font-family: var(--hud); }

/* tubo H */
.tube-h {
  width: 100%; height: 36px;
  background: #0a120d; border-radius: 18px;
  border: 2px solid var(--border);
  position: relative; overflow: hidden;
  box-shadow: inset 0 2px 8px rgba(0,0,0,.6);
}
.tube-h::before, .tube-h::after {
  content: ''; position: absolute;
  top: 8px; bottom: 8px; width: 2px;
  background: rgba(0,232,122,.2);
}
.tube-h::before { left: calc(50% - 10px); }
.tube-h::after  { left: calc(50% + 10px); }

.bub-h {
  position: absolute; top: 4px; bottom: 4px; width: 28px;
  border-radius: 14px;
  background: radial-gradient(circle at 35% 35%, rgba(255,255,255,.5), rgba(0,232,122,.7) 60%);
  box-shadow: 0 0 12px rgba(0,232,122,.6);
  transform: translateX(-50%); left: 50%;
  transition: left .1s cubic-bezier(.25,.8,.25,1);
}

/* tubo V + cerchio 2D */
.row2 { display: flex; align-items: center; gap: 16px; }

.tube-v {
  height: 80px; width: 36px;
  background: #0a120d; border-radius: 18px;
  border: 2px solid var(--border);
  position: relative; overflow: hidden;
  box-shadow: inset 2px 0 8px rgba(0,0,0,.6); flex-shrink: 0;
}
.tube-v::before, .tube-v::after {
  content: ''; position: absolute;
  left: 8px; right: 8px; height: 2px;
  background: rgba(0,232,122,.2);
}
.tube-v::before { top: calc(50% - 10px); }
.tube-v::after  { top: calc(50% + 10px); }

.bub-v {
  position: absolute; left: 4px; right: 4px; height: 28px;
  border-radius: 14px;
  background: radial-gradient(circle at 35% 35%, rgba(255,255,255,.5), rgba(0,232,122,.7) 60%);
  box-shadow: 0 0 12px rgba(0,232,122,.6);
  top: 50%; transform: translateY(-50%);
  transition: top .1s cubic-bezier(.25,.8,.25,1);
}

/* cerchio 2D */
.wrap2d { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 6px; }
.wrap2d-label { font-size: .65rem; letter-spacing: .15em; text-transform: uppercase; color: var(--muted); }
.circle {
  width: 130px; height: 130px; border-radius: 50%;
  background: #0a120d; border: 2px solid var(--border);
  position: relative; box-shadow: inset 0 2px 12px rgba(0,0,0,.7);
}
.circle::before {
  content: ''; position: absolute; top: 50%; left: 50%;
  transform: translate(-50%,-50%);
  width: 28px; height: 28px; border-radius: 50%;
  border: 1px solid rgba(0,232,122,.2);
}
.ch, .cv { position: absolute; background: rgba(0,232,122,.12); pointer-events: none; }
.ch { left: 0; right: 0; top: 50%; height: 1px; transform: translateY(-50%); }
.cv { top: 0; bottom: 0; left: 50%; width: 1px; transform: translateX(-50%); }
.bub-2d {
  position: absolute; width: 22px; height: 22px; border-radius: 50%;
  background: radial-gradient(circle at 35% 35%, rgba(255,255,255,.6), rgba(0,232,122,.8) 60%);
  box-shadow: 0 0 14px rgba(0,232,122,.7);
  top: 50%; left: 50%; transform: translate(-50%,-50%);
  transition: top .1s cubic-bezier(.25,.8,.25,1), left .1s cubic-bezier(.25,.8,.25,1);
}
.bub-2d.ok { background: radial-gradient(circle at 35% 35%, #fff, #00ff88 60%); box-shadow: 0 0 20px #00ff88; }

/* ── HUD ── */
.hud {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 8px; padding: 0 16px;
}
.hcell {
  background: var(--panel); border: 1px solid var(--border);
  border-radius: 4px; padding: 10px; text-align: center;
}
.hcell .k { font-size: .6rem; letter-spacing: .15em; text-transform: uppercase; color: var(--muted); display: block; margin-bottom: 4px; }
.hcell .v { font-family: var(--hud); font-size: 1.4rem; color: var(--green); display: block; line-height: 1; }
.hcell .v.warn { color: var(--amber); }
.hcell .v.ok   { color: var(--green); text-shadow: 0 0 8px var(--green); }
.hcell .u { font-size: .6rem; color: var(--muted); }

/* ── ERRORE ── */
#err {
  margin: 0 16px 0;
  padding: 8px 12px;
  background: rgba(255,61,61,.1);
  border: 1px solid rgba(255,61,61,.3);
  border-radius: 4px;
  font-size: .75rem; color: var(--red);
  font-family: var(--hud);
  display: none;
}

/* ── BOTTONI ── */
.actions { padding: 14px 16px 20px; display: flex; gap: 10px; margin-top: auto; }
button {
  font-family: var(--ui); font-weight: 700; font-size: .9rem;
  letter-spacing: .08em; text-transform: uppercase;
  border: none; border-radius: 4px; cursor: pointer;
  padding: 13px 0; transition: opacity .15s, transform .1s;
  -webkit-tap-highlight-color: transparent;
}
button:active { transform: scale(.97); }

#btnConn { background: var(--green); color: #000; flex: 1; }
#btnDisc { background: transparent; border: 1px solid var(--border); color: var(--muted); flex: 1; display: none; }
#btnTara { background: transparent; border: 1px solid var(--border); color: var(--text); flex: 0 0 auto; padding: 13px 18px; }
#btnTara:disabled { opacity: .3; cursor: not-allowed; }

footer {
  padding: 8px 16px; font-size: .6rem; color: var(--muted);
  letter-spacing: .08em; text-align: center;
  border-top: 1px solid var(--border); font-family: var(--hud);
}
</style>
</head>
<body>

<header>
  <div class="logo">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <circle cx="12" cy="12" r="3"/>
      <line x1="12" y1="2" x2="12" y2="6"/><line x1="12" y1="18" x2="12" y2="22"/>
      <line x1="2" y1="12" x2="6" y2="12"/><line x1="18" y1="12" x2="22" y2="12"/>
    </svg>
    Livella Pro <span class="sub">BLE</span>
  </div>
  <div class="status-row">
    <span id="stxt">OFFLINE</span>
    <div id="dot"></div>
  </div>
</header>

<div id="banner">○ · · IN ATTESA · · ○</div>

<div class="levels">

  <!-- ROLL -->
  <div class="card">
    <div class="card-label"><span>Sinistra / Destra</span><span class="ax">ROLL</span></div>
    <div class="tube-h" id="tubeH"><div class="bub-h" id="bubH"></div></div>
  </div>

  <!-- PITCH + 2D -->
  <div class="card">
    <div class="card-label"><span>Avanti / Indietro</span><span class="ax">PITCH</span></div>
    <div class="row2">
      <div class="tube-v" id="tubeV"><div class="bub-v" id="bubV"></div></div>
      <div class="wrap2d">
        <span class="wrap2d-label">Piano 2D</span>
        <div class="circle">
          <div class="ch"></div><div class="cv"></div>
          <div class="bub-2d" id="bub2d"></div>
        </div>
      </div>
    </div>
  </div>

</div>

<!-- HUD -->
<div class="hud">
  <div class="hcell"><span class="k">Roll</span><span class="v" id="hRoll">--.-</span><span class="u">°</span></div>
  <div class="hcell"><span class="k">Pitch</span><span class="v" id="hPitch">--.-</span><span class="u">°</span></div>
</div>

<div id="err"></div>

<div class="actions">
  <button id="btnConn">⬡ Connetti BLE</button>
  <button id="btnDisc">Disconnetti</button>
  <button id="btnTara" disabled>TARA</button>
</div>

<footer>ESP32-C3 · MPU6050 · Bluefy (iOS) · Chrome (Android)</footer>

<script>
const SVC = '6e400001-b5a3-f393-e0a9-e50e24dcca9e';
const TX  = '6e400003-b5a3-f393-e0a9-e50e24dcca9e';

let device, pOff = 0, rOff = 0, lp = 0, lr = 0;
const THR = 0.4;

const $ = id => document.getElementById(id);
const btnConn  = $('btnConn');
const btnDisc  = $('btnDisc');
const btnTara  = $('btnTara');
const dot      = $('dot');
const stxt     = $('stxt');
const banner   = $('banner');
const bubH     = $('bubH');
const bubV     = $('bubV');
const bub2d    = $('bub2d');
const hRoll    = $('hRoll');
const hPitch   = $('hPitch');
const tubeH    = $('tubeH');
const tubeV    = $('tubeV');
const errBox   = $('err');

// Bluefy espone navigator.bluetooth con ritardo → check dopo load
window.addEventListener('load', () => setTimeout(() => {
  if (!navigator.bluetooth) {
    setErr('Apri questa pagina dentro Bluefy (iOS) oppure Chrome (Android).');
    btnConn.disabled = true;
  }
}, 600));

// ── CONNETTI ──────────────────────────────────────────────────────────────────
btnConn.addEventListener('click', async () => {
  if (!navigator.bluetooth) { setErr('Web Bluetooth non disponibile.'); return; }
  setSt('scan'); setErr('');
  try {
    // acceptAllDevices necessario per Bluefy su iOS
    device = await navigator.bluetooth.requestDevice({
      acceptAllDevices: true,
      optionalServices: [SVC]
    });

    device.addEventListener('gattserverdisconnected', onDisc);
    setSt('conn');

    // Pausa necessaria su Bluefy/iOS prima del connect GATT
    await delay(600);

    let server;
    try { server = await device.gatt.connect(); }
    catch(e) { throw new Error('Connessione GATT fallita: ' + e.message); }

    let svc;
    try { svc = await server.getPrimaryService(SVC); }
    catch(e) { throw new Error('Servizio NUS non trovato — hai selezionato "Livella Pro"? (' + e.message + ')'); }

    let ch;
    try {
      ch = await svc.getCharacteristic(TX);
      await ch.startNotifications();
    } catch(e) { throw new Error('Caratteristica non disponibile: ' + e.message); }

    ch.addEventListener('characteristicvaluechanged', onData);

    setSt('ok');
    btnConn.style.display = 'none';
    btnDisc.style.display = 'block';
    btnTara.disabled = false;

  } catch(e) {
    if (e.name !== 'NotFoundError') setErr('⚠ ' + e.message);
    setSt('off');
  }
});

// ── DISCONNETTI ───────────────────────────────────────────────────────────────
btnDisc.addEventListener('click', () => { if (device?.gatt.connected) device.gatt.disconnect(); });

function onDisc() {
  setSt('off');
  btnConn.style.display = 'block';
  btnDisc.style.display = 'none';
  btnTara.disabled = true;
  reset();
}

// ── TARA ──────────────────────────────────────────────────────────────────────
btnTara.addEventListener('click', () => { pOff = lp; rOff = lr; });

// ── DATI BLE ──────────────────────────────────────────────────────────────────
let buf = '';
function onData(e) {
  buf += new TextDecoder().decode(e.target.value);
  const lines = buf.split('\n'); buf = lines.pop();
  for (const l of lines) {
    const p = l.trim().split(',');
    if (p.length < 2) continue;
    lp = parseFloat(p[0]); lr = parseFloat(p[1]);
    const pitch = lp - pOff, roll = lr - rOff;
    const ok = Math.abs(pitch) < THR && Math.abs(roll) < THR;
    draw(pitch, roll, ok);
  }
}

// ── DISEGNO ───────────────────────────────────────────────────────────────────
function draw(pitch, roll, ok) {
  hRoll.textContent  = roll.toFixed(1);
  hPitch.textContent = pitch.toFixed(1);
  hRoll.className    = 'v' + (ok ? ' ok' : Math.abs(roll)  > .5 ? ' warn' : '');
  hPitch.className   = 'v' + (ok ? ' ok' : Math.abs(pitch) > .5 ? ' warn' : '');

  const tw = tubeH.offsetWidth;
  const rc = Math.max(-45, Math.min(45, roll));
  bubH.style.left = ((tw/2) + (rc/45)*(tw*.42)) + 'px';

  const th = tubeV.offsetHeight;
  const pc = Math.max(-45, Math.min(45, pitch));
  bubV.style.top = ((th/2) + (pc/45)*(th*.42)) + 'px';

  const r = Math.min(46, Math.sqrt(roll*roll+pitch*pitch)/45*46);
  const a = Math.atan2(pitch, roll);
  bub2d.style.left = (65 + r*Math.cos(a)) + 'px';
  bub2d.style.top  = (65 + r*Math.sin(a)) + 'px';
  bub2d.classList.toggle('ok', ok);

  if (ok) {
    banner.textContent = '✓  IN BOLLA  ✓';
    banner.classList.add('ok');
    if (navigator.vibrate) navigator.vibrate(40);
  } else {
    banner.textContent = `◦ R ${roll>=0?'+':''}${roll.toFixed(2)}°  P ${pitch>=0?'+':''}${pitch.toFixed(2)}° ◦`;
    banner.classList.remove('ok');
  }
}

// ── STATUS ────────────────────────────────────────────────────────────────────
function setSt(s) {
  dot.className = '';
  const m = { off:['OFFLINE',''], scan:['RICERCA...','blink'], conn:['CONNESSIONE','blink'], ok:['CONNESSO','on'] };
  const [t,c] = m[s]||['--',''];
  stxt.textContent = t;
  if (c) dot.classList.add(c);
}

function setErr(msg) {
  errBox.textContent = msg;
  errBox.style.display = msg ? 'block' : 'none';
}

function reset() {
  hRoll.textContent = '--.-'; hPitch.textContent = '--.-';
  bubH.style.left = '50%'; bubV.style.top = '50%';
  bub2d.style.left = '65px'; bub2d.style.top = '65px';
  banner.textContent = '○ · · IN ATTESA · · ○';
  banner.classList.remove('ok');
  pOff = 0; rOff = 0;
}

const delay = ms => new Promise(r => setTimeout(r, ms));
</script>
</body>
</html>
