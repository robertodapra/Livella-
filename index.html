<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LIVELLA PRO BLUETOOTH</title>
    <style>
        :root { --orange: #ff6600; --black: #1a1a1a; --neon: #adff2f; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--black); color: white; margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        
        .tool-body { background: var(--orange); padding: 30px; border-radius: 25px; width: 90%; max-width: 400px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); text-align: center; border-bottom: 8px solid #cc5200; }
        
        .vial { background: #000; border: 4px solid #333; border-radius: 50px; position: relative; height: 70px; margin: 25px 0; overflow: hidden; box-shadow: inset 0 0 15px #000; }
        .bubble { background: var(--neon); width: 80px; height: 50px; border-radius: 25px; position: absolute; top: 10px; left: 50%; transform: translateX(-50%); transition: transform 0.1s linear; box-shadow: 0 0 20px var(--neon); }
        
        .value { font-size: 4rem; font-weight: 900; color: var(--black); margin: 10px 0; font-family: monospace; }
        .unit { font-size: 1.5rem; vertical-align: top; }

        button { width: 100%; padding: 20px; font-size: 1.2rem; font-weight: bold; border: none; border-radius: 15px; cursor: pointer; text-transform: uppercase; transition: 0.2s; }
        #btnConnect { background: var(--black); color: white; }
        #btnTara { background: rgba(255,255,255,0.3); color: var(--black); margin-top: 15px; display: none; }
        
        .status { margin-bottom: 10px; font-size: 0.8rem; font-weight: bold; color: rgba(0,0,0,0.5); }
    </style>
</head>
<body>

    <div class="tool-body">
        <div id="status" class="status">DISPOSITIVO SCOLLEGATO</div>
        
        <div class="value"><span id="deg">0.0</span><span class="unit">°</span></div>

        <div class="vial">
            <div id="bubble" class="bubble"></div>
        </div>

        <button id="btnConnect" onclick="connectBLE()">🔍 COLLEGA LIVELLA</button>
        <button id="btnTara" onclick="tara()">TARA ZERO</button>
    </div>

    <script>
        let characteristic;
        let offset = 0;

        // I due codici (UUID) devono corrispondere a quelli nel codice Arduino
        const SERVICE_UUID = "4fafc201-1fb5-459e-8fcc-c5c9c331914b";
        const CHARACTERISTIC_UUID = "beb5483e-36e1-4688-b7f5-ea07361b26a8";

        async function connectBLE() {
            try {
                const device = await navigator.bluetooth.requestDevice({
                    filters: [{ name: 'LIVELLA_PRO' }],
                    optionalServices: [SERVICE_UUID]
                });

                document.getElementById('status').innerText = "CONNESSIONE IN CORSO...";
                const server = await device.gatt.connect();
                const service = await server.getPrimaryService(SERVICE_UUID);
                characteristic = await service.getCharacteristic(CHARACTERISTIC_UUID);

                await characteristic.startNotifications();
                characteristic.addEventListener('characteristicvaluechanged', (event) => {
                    const decoder = new TextDecoder('utf-8');
                    const data = decoder.decode(event.target.value);
                    updateUI(parseFloat(data));
                });

                document.getElementById('status').innerText = "LIVELLA CONNESSA VIA BT";
                document.getElementById('btnConnect').style.display = "none";
                document.getElementById('btnTara').style.display = "block";

            } catch (error) {
                console.error(error);
                alert("Errore: assicurati che il Bluetooth sia attivo e di usare Chrome/Edge.");
            }
        }

        function updateUI(val) {
            const currentVal = val - offset;
            document.getElementById('deg').innerText = currentVal.toFixed(1);

            // Muovi la bolla (max +/- 140px di escursione)
            const move = Math.max(-140, Math.min(140, currentVal * 15));
            document.getElementById('bubble').style.transform = `translateX(calc(-50% + ${move}px))`;

            // Se è vicino allo zero (in bolla), cambia leggermente il colore
            if(Math.abs(currentVal) < 0.2) {
                document.getElementById('bubble').style.background = "#fff";
            } else {
                document.getElementById('bubble').style.background = "var(--neon)";
            }
        }

        function tara() {
            const currentRaw = parseFloat(document.getElementById('deg').innerText) + offset;
            offset = currentRaw;
            alert("Zero impostato!");
        }
    </script>
</body>
</html>
